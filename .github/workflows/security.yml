name: Reusable security scan

# CodeQL + dependency review. Callable via workflow_call from every repo's
# security.yml. Free on public repos; requires GHAS on private (most GitHub
# plans include it).

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: "ubuntu-latest"
      languages:
        description: "Comma-separated CodeQL languages (go, javascript, python, ...)"
        type: string
        default: "go"
      go-version:
        type: string
        default: "1.25"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        language: ["go"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        if: matrix.language == 'go'
        with:
          go-version: ${{ inputs.go-version }}

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dependency-review:
    # Only runs on PRs; provides inline annotations for risky new deps.
    if: github.event_name == 'pull_request'
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
