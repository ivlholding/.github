          done < <(git config --global --name-only --get-regexp '^http\.' || true)
          while IFS= read -r key; do
            git config --global --unset-all "$key" 2>/dev/null || true
          done < <(git config --global --name-only --get-regexp '^url\.' || true)
          rm -f ~/.netrc || true
