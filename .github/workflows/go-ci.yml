name: Reusable Go CI

# Lint + unit test + build for any Go module. Called via `workflow_call`.
# Keep this strictly language-level; integration stacks live in go-integration.yml.
#
# Private module support: set `private-modules: true` and pass `secrets.IVL_MODULES_TOKEN`
# (a fine-grained PAT with Contents:Read on ivlholding/*). The workflow then configures
# GOPRIVATE + GOSUMDB=off + ~/.netrc + a git insteadOf rewrite so `go mod download`
# can fetch private repos like scraper-core.

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        default: "1.25"
      runner:
        type: string
        default: "self-hosted"
      run-tests:
        type: boolean
        default: true
      coverage:
        type: boolean
        default: true
      private-modules:
        description: "Enable GOPRIVATE + git insteadOf for ivlholding/* access"
        type: boolean
        default: false
    secrets:
      IVL_MODULES_TOKEN:
        description: "PAT with read access to ivlholding/* repos (required when private-modules=true)"
        required: false

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ inputs.runner }}
    steps:
      # Self-hosted runners persist $HOME across jobs, so any git config
      # --global set by a previous workflow run (including a stale
      # http.<ivlholding>.extraheader with an old token) is active when
      # actions/checkout runs. Wipe every such value before checkout so
      # the workflow's own GITHUB_TOKEN — which is what checkout relies
      # on for the caller repo itself — wins uncontested.
      - name: Reset persistent ivlholding git auth state
        run: |
          # Remove every http.* extraheader scoped to an ivlholding URL.
          # Leave non-ivlholding entries alone so unrelated configs
          # survive.
          while IFS= read -r key; do
            git config --global --unset-all "$key" 2>/dev/null || true
          done < <(git config --global --name-only --get-regexp '^http\..*ivlholding.*\.extraheader$' || true)
          # Also defensively drop any leftover url.*.insteadOf rewrites we
          # used in earlier attempts; they're no longer part of the
          # contract.
          while IFS= read -r key; do
            git config --global --unset-all "$key" 2>/dev/null || true
          done < <(git config --global --name-only --get-regexp '^url\..*\.insteadof$' || true)
          # Wipe any stale netrc a previous run wrote.
          rm -f ~/.netrc || true
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Configure private module access
        if: inputs.private-modules
        env:
          TOKEN: ${{ secrets.IVL_MODULES_TOKEN }}
        run: |
          # Auth story for a fine-grained PAT reaching private ivlholding
          # repos from within self-hosted runners:
          #
          # Earlier attempts tried url.<pat-embedded-url>.insteadOf (git
          # replaces URL, sends PAT as basic-auth username "x-access-token"
          # — REJECTED by GitHub for fine-grained PATs, accepted only for
          # classic PATs + GitHub App tokens), and http.extraheader at the
          # ivlholding/ URL prefix (didn't trigger reliably during go mod
          # download's background git clones).
          #
          # Final: use the broadest URL prefix — `https://github.com/` —
          # same form actions/checkout writes, but with our PAT in
          # `Authorization: token <pat>` header form (verified against
          # GitHub's REST API via the probe below: returns 200). Env-var
          # form (GIT_CONFIG_COUNT/KEY/VALUE) so it's job-scoped and does
          # not persist to $HOME on self-hosted runners. Overrides
          # actions/checkout's --local extraheader because it's set to
          # a longer prefix match at --global tier.
          {
            echo "GIT_CONFIG_COUNT=1"
            echo "GIT_CONFIG_KEY_0=http.https://github.com/.extraheader"
            echo "GIT_CONFIG_VALUE_0=Authorization: token $TOKEN"
          } >> "$GITHUB_ENV"
          # Netrc defense-in-depth for Go's direct-proxy fallback path.
          # Fine-grained PATs authenticate with login=oauth2 (NOT
          # x-access-token) over netrc basic auth.
          install -m 0600 /dev/null ~/.netrc
          printf 'machine github.com\nlogin oauth2\npassword %s\n' "$TOKEN" > ~/.netrc
          # Drop actions/checkout's --local extraheader in the caller
          # repo so nothing races with our env-scoped config if Go clones
          # into this dir for any reason.
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          # Go env.
          echo "GOPRIVATE=github.com/ivlholding/*" >> "$GITHUB_ENV"
          echo "GOSUMDB=off" >> "$GITHUB_ENV"
          # Purge any stale VCS cache poisoned by a previous failed auth
          # attempt (self-hosted runners persist /root/go/pkg/mod).
          rm -rf "$(go env GOMODCACHE)/cache/vcs" 2>/dev/null || true
          # Diagnostic: surface the configured rewrites in CI logs with
          # the token redacted so failures elsewhere are easy to triage.
          echo "--- configured url rewrites ---"
          git config --global --get-regexp '^url\.' | sed 's|x-access-token:[^@]*@|x-access-token:***@|g' || true
          # Direct probe: verify the PAT actually authenticates against
          # the private dep before Go tries. Prints the HTTP status only
          # (no token value) so a wrong/stale secret is obvious in the
          # logs without guessing from downstream symptoms.
          echo "--- IVL_MODULES_TOKEN probe ---"
          if [ -z "$TOKEN" ]; then
            echo "  ERROR: TOKEN is empty — IVL_MODULES_TOKEN secret is not set in this repo"
          else
            code=$(curl -sSL -o /dev/null -w '%{http_code}' -H "Authorization: token $TOKEN" \
              "https://api.github.com/repos/ivlholding/scraper-apis")
            echo "  GET /repos/ivlholding/scraper-apis -> HTTP $code"
            echo "  token length: ${#TOKEN}   prefix: ${TOKEN:0:8}..."
            if [ "$code" != "200" ]; then
              echo "  FAIL: token cannot read ivlholding/scraper-apis. Likely causes:"
              echo "    - IVL_MODULES_TOKEN secret holds a stale / regenerated token value"
              echo "    - token expired / revoked"
              echo "    - fine-grained PAT missing Contents:Read on scraper-apis"
            fi
          fi
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    if: inputs.run-tests
    runs-on: ${{ inputs.runner }}
    steps:
      # Self-hosted runners persist $HOME across jobs, so any git config
      # --global set by a previous workflow run (including a stale
      # http.<ivlholding>.extraheader with an old token) is active when
      # actions/checkout runs. Wipe every such value before checkout so
      # the workflow's own GITHUB_TOKEN — which is what checkout relies
      # on for the caller repo itself — wins uncontested.
      - name: Reset persistent ivlholding git auth state
        run: |
          # Remove every http.* extraheader scoped to an ivlholding URL.
          # Leave non-ivlholding entries alone so unrelated configs
          # survive.
          while IFS= read -r key; do
            git config --global --unset-all "$key" 2>/dev/null || true
          done < <(git config --global --name-only --get-regexp '^http\..*ivlholding.*\.extraheader$' || true)
          # Also defensively drop any leftover url.*.insteadOf rewrites we
          # used in earlier attempts; they're no longer part of the
          # contract.
          while IFS= read -r key; do
            git config --global --unset-all "$key" 2>/dev/null || true
          done < <(git config --global --name-only --get-regexp '^url\..*\.insteadof$' || true)
          # Wipe any stale netrc a previous run wrote.
          rm -f ~/.netrc || true
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Configure private module access
        if: inputs.private-modules
        env:
          TOKEN: ${{ secrets.IVL_MODULES_TOKEN }}
        run: |
          # See lint job for the full rationale. Env-scoped git config so
          # nothing persists across runs on self-hosted runners.
          {
            echo "GIT_CONFIG_COUNT=1"
            echo "GIT_CONFIG_KEY_0=http.https://github.com/.extraheader"
            echo "GIT_CONFIG_VALUE_0=Authorization: token $TOKEN"
          } >> "$GITHUB_ENV"
          install -m 0600 /dev/null ~/.netrc
          printf 'machine github.com\nlogin oauth2\npassword %s\n' "$TOKEN" > ~/.netrc
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          echo "GOPRIVATE=github.com/ivlholding/*" >> "$GITHUB_ENV"
          echo "GOSUMDB=off" >> "$GITHUB_ENV"
          rm -rf "$(go env GOMODCACHE)/cache/vcs" 2>/dev/null || true
          echo "--- configured url rewrites ---"
          git config --global --get-regexp '^url\.' | sed 's|x-access-token:[^@]*@|x-access-token:***@|g' || true
          # Direct probe: verify the PAT actually authenticates against
          # the private dep before Go tries. Prints the HTTP status only
          # (no token value) so a wrong/stale secret is obvious in the
          # logs without guessing from downstream symptoms.
          echo "--- IVL_MODULES_TOKEN probe ---"
          if [ -z "$TOKEN" ]; then
            echo "  ERROR: TOKEN is empty — IVL_MODULES_TOKEN secret is not set in this repo"
          else
            code=$(curl -sSL -o /dev/null -w '%{http_code}' -H "Authorization: token $TOKEN" \
              "https://api.github.com/repos/ivlholding/scraper-apis")
            echo "  GET /repos/ivlholding/scraper-apis -> HTTP $code"
            echo "  token length: ${#TOKEN}   prefix: ${TOKEN:0:8}..."
            if [ "$code" != "200" ]; then
              echo "  FAIL: token cannot read ivlholding/scraper-apis. Likely causes:"
              echo "    - IVL_MODULES_TOKEN secret holds a stale / regenerated token value"
              echo "    - token expired / revoked"
              echo "    - fine-grained PAT missing Contents:Read on scraper-apis"
            fi
          fi
      - name: Unit tests
        run: go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic
      - name: Coverage summary
        if: inputs.coverage
        run: go tool cover -func=coverage.out | tail -20
      - uses: actions/upload-artifact@v4
        if: always() && inputs.coverage
        with:
          name: coverage-report
          path: coverage.out

  build:
    runs-on: ${{ inputs.runner }}
    needs: [lint]
    steps:
      # Self-hosted runners persist $HOME across jobs, so any git config
      # --global set by a previous workflow run (including a stale
      # http.<ivlholding>.extraheader with an old token) is active when
      # actions/checkout runs. Wipe every such value before checkout so
      # the workflow's own GITHUB_TOKEN — which is what checkout relies
      # on for the caller repo itself — wins uncontested.
      - name: Reset persistent ivlholding git auth state
        run: |
          # Remove every http.* extraheader scoped to an ivlholding URL.
          # Leave non-ivlholding entries alone so unrelated configs
          # survive.
          while IFS= read -r key; do
            git config --global --unset-all "$key" 2>/dev/null || true
          done < <(git config --global --name-only --get-regexp '^http\..*ivlholding.*\.extraheader$' || true)
          # Also defensively drop any leftover url.*.insteadOf rewrites we
          # used in earlier attempts; they're no longer part of the
          # contract.
          while IFS= read -r key; do
            git config --global --unset-all "$key" 2>/dev/null || true
          done < <(git config --global --name-only --get-regexp '^url\..*\.insteadof$' || true)
          # Wipe any stale netrc a previous run wrote.
          rm -f ~/.netrc || true
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Configure private module access
        if: inputs.private-modules
        env:
          TOKEN: ${{ secrets.IVL_MODULES_TOKEN }}
        run: |
          # See lint job for the full rationale. Env-scoped git config so
          # nothing persists across runs on self-hosted runners.
          {
            echo "GIT_CONFIG_COUNT=1"
            echo "GIT_CONFIG_KEY_0=http.https://github.com/.extraheader"
            echo "GIT_CONFIG_VALUE_0=Authorization: token $TOKEN"
          } >> "$GITHUB_ENV"
          install -m 0600 /dev/null ~/.netrc
          printf 'machine github.com\nlogin oauth2\npassword %s\n' "$TOKEN" > ~/.netrc
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          echo "GOPRIVATE=github.com/ivlholding/*" >> "$GITHUB_ENV"
          echo "GOSUMDB=off" >> "$GITHUB_ENV"
          rm -rf "$(go env GOMODCACHE)/cache/vcs" 2>/dev/null || true
          echo "--- configured url rewrites ---"
          git config --global --get-regexp '^url\.' | sed 's|x-access-token:[^@]*@|x-access-token:***@|g' || true
