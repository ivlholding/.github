          else
            code=$(curl -sSL -o /dev/null -w '%{http_code}' -H "Authorization: token $TOKEN" \
              "https://api.github.com/repos/ivlholding/scraper-apis")
            echo "  REST API GET /repos/ivlholding/scraper-apis -> HTTP $code"
            echo "  token length: ${#TOKEN}   prefix: ${TOKEN:0:8}..."
            if [ "$code" != "200" ]; then
              echo "  FAIL: token cannot read ivlholding/scraper-apis. Likely causes:"
              echo "    - IVL_MODULES_TOKEN secret holds a stale / regenerated token value"
              echo "    - token expired / revoked"
              echo "    - fine-grained PAT missing Contents:Read on scraper-apis"
            fi
          fi
          # Verify the extraheader route works with the live env config.
          # env-scoped config only takes effect when git is invoked by the
          # parent shell that runs this step, so we need to set the env
          # vars locally to exercise it (GitHub exports $GITHUB_ENV only
          # to subsequent steps, not the current one).
          echo "--- git ls-remote probe (via env-scoped extraheader) ---"
          if GIT_CONFIG_COUNT=1 \
             GIT_CONFIG_KEY_0="http.https://github.com/.extraheader" \
             GIT_CONFIG_VALUE_0="Authorization: token $TOKEN" \
             git ls-remote --exit-code https://github.com/ivlholding/scraper-apis v0.2.0 2>&1 | head -3; then
            echo "  OK: git can reach scraper-apis v0.2.0 with env-scoped extraheader"
          else
            echo "  FAIL: git ls-remote rejected the env-scoped extraheader."
          fi
      - name: Unit tests
        run: go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic
      - name: Coverage summary
        if: inputs.coverage
        run: go tool cover -func=coverage.out | tail -20
      - uses: actions/upload-artifact@v4
        if: always() && inputs.coverage
        with:
          name: coverage-report
          path: coverage.out

  build:
    runs-on: ${{ inputs.runner }}
    needs: [lint]
    steps:
      # Self-hosted runners persist $HOME across jobs. Any git config
      # --global set by a previous workflow run (stale extraheader,
      # credential helper, url rewrite) is active when actions/checkout
      # runs next. Wipe *every* http.* and url.* global config so the
      # workflow's own GITHUB_TOKEN is the only credential in play for
