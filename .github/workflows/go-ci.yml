          TOKEN: ${{ secrets.IVL_MODULES_TOKEN }}
        run: |
          # See lint job for the full rationale. Env-scoped git config so
          # nothing persists across runs on self-hosted runners.
          # Env-scoped git config ONLY — nothing in --global, so nothing
          # persists to $HOME on self-hosted runners to break the next
          # run's actions/checkout. Child processes (including git
          # subprocesses spawned by Go) inherit the env and apply the
          # extraheader at run time.
          {
            echo "GIT_CONFIG_COUNT=1"
            echo "GIT_CONFIG_KEY_0=http.https://github.com/.extraheader"
            echo "GIT_CONFIG_VALUE_0=Authorization: token $TOKEN"
          } >> "$GITHUB_ENV"
          install -m 0600 /dev/null ~/.netrc
          printf 'machine github.com\nlogin oauth2\npassword %s\n' "$TOKEN" > ~/.netrc
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          echo "GOPRIVATE=github.com/ivlholding/*" >> "$GITHUB_ENV"
          echo "GOSUMDB=off" >> "$GITHUB_ENV"
          rm -rf "$(go env GOMODCACHE)/cache/vcs" 2>/dev/null || true
          echo "--- configured url rewrites ---"
          git config --global --get-regexp '^url\.' | sed 's|x-access-token:[^@]*@|x-access-token:***@|g' || true
