          echo "--- IVL_MODULES_TOKEN probe ---"
          if [ -z "$TOKEN" ]; then
            echo "  ERROR: TOKEN is empty — IVL_MODULES_TOKEN secret is not set in this repo"
          else
            code=$(curl -sSL -o /dev/null -w '%{http_code}' -H "Authorization: token $TOKEN" \
              "https://api.github.com/repos/ivlholding/scraper-apis")
            echo "  GET /repos/ivlholding/scraper-apis -> HTTP $code"
            echo "  token length: ${#TOKEN}   prefix: ${TOKEN:0:8}..."
            if [ "$code" != "200" ]; then
              echo "  FAIL: token cannot read ivlholding/scraper-apis. Likely causes:"
              echo "    - IVL_MODULES_TOKEN secret holds a stale / regenerated token value"
              echo "    - token expired / revoked"
              echo "    - fine-grained PAT missing Contents:Read on scraper-apis"
            fi
          fi
      - run: go build ./...
