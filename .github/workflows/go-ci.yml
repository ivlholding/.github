name: Reusable Go CI

# Lint + unit test + build for any Go module. Called via `workflow_call`.
# Keep this strictly language-level; integration stacks live in go-integration.yml.
#
# Private module support: set `private-modules: true` and pass `secrets.IVL_MODULES_TOKEN`
# (a fine-grained PAT with Contents:Read on ivlholding/*). The workflow then configures
# GOPRIVATE + GOSUMDB=off + a git insteadOf rewrite so `go mod download` can fetch
# private repos like scraper-core.

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        default: "1.25"
      runner:
        type: string
        default: "self-hosted"
      run-tests:
        type: boolean
        default: true
      coverage:
        type: boolean
        default: true
      private-modules:
        description: "Enable GOPRIVATE + git insteadOf for ivlholding/* access"
        type: boolean
        default: false
    secrets:
      IVL_MODULES_TOKEN:
        description: "PAT with read access to ivlholding/* repos (required when private-modules=true)"
        required: false

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Configure private module access
        if: inputs.private-modules
        env:
          TOKEN: ${{ secrets.IVL_MODULES_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/ivlholding/".insteadOf "https://github.com/ivlholding/"
          go env -w GOPRIVATE="github.com/ivlholding/*"
          go env -w GOSUMDB=off
          # Purge any stale VCS cache poisoned by previous runs (esp. on
          # self-hosted runners where /root/go/pkg/mod persists).
          rm -rf "$(go env GOMODCACHE)/cache/vcs" 2>/dev/null || true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    if: inputs.run-tests
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Configure private module access
        if: inputs.private-modules
        env:
          TOKEN: ${{ secrets.IVL_MODULES_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/ivlholding/".insteadOf "https://github.com/ivlholding/"
          go env -w GOPRIVATE="github.com/ivlholding/*"
          go env -w GOSUMDB=off
          # Purge any stale VCS cache poisoned by previous runs (esp. on
          # self-hosted runners where /root/go/pkg/mod persists).
          rm -rf "$(go env GOMODCACHE)/cache/vcs" 2>/dev/null || true
      - name: Unit tests
        run: go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic
      - name: Coverage summary
        if: inputs.coverage
        run: go tool cover -func=coverage.out | tail -20
      - uses: actions/upload-artifact@v4
        if: always() && inputs.coverage
        with:
          name: coverage-report
          path: coverage.out

  build:
    runs-on: ${{ inputs.runner }}
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Configure private module access
        if: inputs.private-modules
        env:
          TOKEN: ${{ secrets.IVL_MODULES_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/ivlholding/".insteadOf "https://github.com/ivlholding/"
          go env -w GOPRIVATE="github.com/ivlholding/*"
          go env -w GOSUMDB=off
          # Purge any stale VCS cache poisoned by previous runs (esp. on
          # self-hosted runners where /root/go/pkg/mod persists).
          rm -rf "$(go env GOMODCACHE)/cache/vcs" 2>/dev/null || true
      - run: go build ./...
