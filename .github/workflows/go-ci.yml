name: Reusable Go CI

# Lint + unit test + build for any Go module. Called via `workflow_call`.
# Keep this strictly language-level; integration stacks live in go-integration.yml.
#
# Private module support: set `private-modules: true` and pass `secrets.IVL_MODULES_TOKEN`
# (a fine-grained PAT with Contents:Read on ivlholding/*). The workflow then configures
# GOPRIVATE + GOSUMDB=off + a git insteadOf rewrite so `go mod download` can fetch
# private repos like scraper-core.

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        default: "1.25"
      runner:
        type: string
        default: "self-hosted"
      run-tests:
        type: boolean
        default: true
      coverage:
        type: boolean
        default: true
      private-modules:
        description: "Enable GOPRIVATE + git insteadOf for ivlholding/* access"
        type: boolean
        default: false
    secrets:
      IVL_MODULES_TOKEN:
        description: "PAT with read access to ivlholding/* repos (required when private-modules=true)"
        required: false

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Configure private module access
        if: inputs.private-modules
        env:
          TOKEN: ${{ secrets.IVL_MODULES_TOKEN }}
        run: |
          # Use env-var-based git config so the rewrite is scoped to this
          # job and every child process inherits it (including git invoked
          # by `go mod download`). Independent of $HOME / user changes,
          # which have bitten us on self-hosted runners.
          echo "GIT_CONFIG_COUNT=1" >> "$GITHUB_ENV"
          echo "GIT_CONFIG_KEY_0=url.https://x-access-token:${TOKEN}@github.com/ivlholding/.insteadOf" >> "$GITHUB_ENV"
          echo "GIT_CONFIG_VALUE_0=https://github.com/ivlholding/" >> "$GITHUB_ENV"
          echo "GOPRIVATE=github.com/ivlholding/*" >> "$GITHUB_ENV"
          echo "GOSUMDB=off" >> "$GITHUB_ENV"
          # Disable GOAUTH=netrc that actions/setup-go@v5 wires with the
          # workflow's default GITHUB_TOKEN. That token is scoped to the
          # caller repo only — it has no read access to sibling
          # ivlholding/* repos, so Go's netrc lookup "wins" over our
          # PAT-backed insteadOf rewrite and GitHub rejects the creds with
          # "Invalid username or token". Setting GOAUTH= (empty) disables
          # Go's auth layer so git's configured insteadOf is consulted
          # instead.
          echo "GOAUTH=" >> "$GITHUB_ENV"
          # Neutralise the http.https://github.com/.extraheader that
          # actions/checkout@v4 writes into the local repo's git config —
          # go mod download inherits HOME/global config, not --local, but
          # unsetting it defensively keeps this runner's state clean.
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          # Purge stale VCS cache that may have cached bad credentials
          # from earlier runs on self-hosted runners.
          rm -rf "$(go env GOMODCACHE)/cache/vcs" 2>/dev/null || true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    if: inputs.run-tests
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Configure private module access
        if: inputs.private-modules
        env:
          TOKEN: ${{ secrets.IVL_MODULES_TOKEN }}
        run: |
          echo "GIT_CONFIG_COUNT=1" >> "$GITHUB_ENV"
          echo "GIT_CONFIG_KEY_0=url.https://x-access-token:${TOKEN}@github.com/ivlholding/.insteadOf" >> "$GITHUB_ENV"
          echo "GIT_CONFIG_VALUE_0=https://github.com/ivlholding/" >> "$GITHUB_ENV"
          echo "GOPRIVATE=github.com/ivlholding/*" >> "$GITHUB_ENV"
          echo "GOSUMDB=off" >> "$GITHUB_ENV"
          # See lint job for the full rationale. Short version: disable
          # GOAUTH's default netrc (workflow GITHUB_TOKEN lacks cross-repo
          # access) and clear checkout's extraheader so the PAT-backed
          # insteadOf rewrite is the only credential source.
          echo "GOAUTH=" >> "$GITHUB_ENV"
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          rm -rf "$(go env GOMODCACHE)/cache/vcs" 2>/dev/null || true
      - name: Unit tests
        run: go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic
      - name: Coverage summary
        if: inputs.coverage
        run: go tool cover -func=coverage.out | tail -20
      - uses: actions/upload-artifact@v4
        if: always() && inputs.coverage
        with:
          name: coverage-report
          path: coverage.out

  build:
    runs-on: ${{ inputs.runner }}
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: Configure private module access
        if: inputs.private-modules
        env:
          TOKEN: ${{ secrets.IVL_MODULES_TOKEN }}
        run: |
          echo "GIT_CONFIG_COUNT=1" >> "$GITHUB_ENV"
          echo "GIT_CONFIG_KEY_0=url.https://x-access-token:${TOKEN}@github.com/ivlholding/.insteadOf" >> "$GITHUB_ENV"
          echo "GIT_CONFIG_VALUE_0=https://github.com/ivlholding/" >> "$GITHUB_ENV"
          echo "GOPRIVATE=github.com/ivlholding/*" >> "$GITHUB_ENV"
          echo "GOSUMDB=off" >> "$GITHUB_ENV"
          # See lint job for the full rationale. Disable GOAUTH's default
          # netrc and clear checkout's extraheader so the PAT-backed
          # insteadOf is the only credential source Go sees.
          echo "GOAUTH=" >> "$GITHUB_ENV"
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          # Purge any stale VCS cache poisoned by previous runs (esp. on
          # self-hosted runners where /root/go/pkg/mod persists).
          rm -rf "$(go env GOMODCACHE)/cache/vcs" 2>/dev/null || true
      - run: go build ./...
