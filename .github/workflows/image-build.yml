name: Reusable image build

# Build → scan → push → sign (by digest) → SBOM attest → SLSA-3 provenance.
# Called on tag `v*` from per-service image.yml workflows.

on:
  workflow_call:
    inputs:
      service-name:
        description: "Logical service name — used as image repo suffix"
        type: string
        required: true
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
      registry:
        type: string
        default: "zot.internal/scraper"
      runner:
        type: string
        default: "self-hosted"
      max-size-bytes:
        description: "Hard size ceiling for the final image. Default 150MB."
        type: number
        default: 157286400
      require-nonroot:
        description: "Fail if image runs as root. Default true."
        type: boolean
        default: true
    secrets:
      COSIGN_KEY:
        required: true
      COSIGN_PASSWORD:
        required: false
      REGISTRY_USER:
        required: true
      REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read
  id-token: write       # OIDC for keyless attestation (SLSA-3 provenance)
  attestations: write   # GitHub-native attestation storage

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    env:
      IMAGE_REF: ${{ inputs.registry }}/${{ inputs.service-name }}:${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Registry login
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ inputs.registry }} -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build
        run: docker build -f ${{ inputs.dockerfile }} -t "$IMAGE_REF" ${{ inputs.context }}

      - name: Image hygiene gates (nonroot + size)
        run: |
          SIZE=$(docker image inspect "$IMAGE_REF" --format '{{.Size}}')
          echo "Image size: $SIZE bytes (limit ${{ inputs.max-size-bytes }})"
          [ "$SIZE" -le "${{ inputs.max-size-bytes }}" ] || { echo "::error::image exceeds size limit"; exit 1; }

          if [ "${{ inputs.require-nonroot }}" = "true" ]; then
            USER=$(docker image inspect "$IMAGE_REF" --format '{{.Config.User}}')
            case "$USER" in
              ""|"0"|"root")
                echo "::error::image runs as root — set USER nonroot in Dockerfile"
                exit 1
                ;;
            esac
            echo "Image user: $USER"
          fi

      - name: Trivy CRITICAL gate
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Trivy HIGH report (non-blocking)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          severity: HIGH
          exit-code: '0'

      - name: Push
        id: push
        run: |
          docker push "$IMAGE_REF"
          # Resolve the content-addressable digest that was just pushed.
          # RepoDigests is populated by the daemon after a successful push.
          DIGEST=$(docker image inspect "$IMAGE_REF" --format '{{range .RepoDigests}}{{println .}}{{end}}' \
            | grep "^${{ inputs.registry }}/${{ inputs.service-name }}@" \
            | head -1 \
            | awk -F@ '{print $2}')
          if [ -z "$DIGEST" ]; then
            echo "::error::failed to resolve digest for $IMAGE_REF after push"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "ref-by-digest=${{ inputs.registry }}/${{ inputs.service-name }}@$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Pushed digest: $DIGEST"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOMs
        run: syft "${{ steps.push.outputs.ref-by-digest }}" -o cyclonedx-json=sbom.cdx.json -o spdx-json=sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ inputs.service-name }}-${{ github.ref_name }}
          path: |
            sbom.cdx.json
            sbom.spdx.json

      - name: Sign image by digest
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: cosign sign --yes --key env://COSIGN_KEY "${{ steps.push.outputs.ref-by-digest }}"

      - name: Attest CycloneDX SBOM
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign attest --yes --key env://COSIGN_KEY \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${{ steps.push.outputs.ref-by-digest }}"

      - name: Attest SPDX SBOM
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign attest --yes --key env://COSIGN_KEY \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ steps.push.outputs.ref-by-digest }}"

      - name: SLSA-3 build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ inputs.registry }}/${{ inputs.service-name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
