name: Reusable image build

# Build → Trivy CRITICAL gate → Cosign sign → push to Zot.
# Called on tag `v*` from per-service image.yml workflows.

on:
  workflow_call:
    inputs:
      service-name:
        description: "Logical service name — used as image repo suffix"
        type: string
        required: true
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
      registry:
        type: string
        default: "zot.internal/scraper"
      runner:
        type: string
        default: "self-hosted"
    secrets:
      COSIGN_KEY:
        required: true
      COSIGN_PASSWORD:
        required: false
      REGISTRY_USER:
        required: true
      REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read
  id-token: write       # OIDC for keyless attestation (SLSA-3 provenance)
  attestations: write   # GitHub-native attestation storage
  packages: write       # push to GHCR fallback

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    env:
      IMAGE: ${{ inputs.registry }}/${{ inputs.service-name }}:${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Registry login
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ inputs.registry }} -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build
        run: docker build -f ${{ inputs.dockerfile }} -t "$IMAGE" ${{ inputs.context }}

      - name: Trivy CRITICAL gate
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Trivy HIGH report (non-blocking)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE }}
          severity: HIGH
          exit-code: '0'

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: syft "$IMAGE" -o cyclonedx-json=sbom.cdx.json -o spdx-json=sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ inputs.service-name }}-${{ github.ref_name }}
          path: |
            sbom.cdx.json
            sbom.spdx.json

      - name: Sign image
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: cosign sign --yes --key env://COSIGN_KEY "$IMAGE"

      - name: Attest SBOM (in-toto)
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: cosign attest --yes --key env://COSIGN_KEY --predicate sbom.cdx.json --type cyclonedx "$IMAGE"

      - name: Push
        id: push
        run: |
          DIGEST=$(docker push "$IMAGE" --format json | jq -r '.[0].digest // empty')
          if [ -z "$DIGEST" ]; then
            # Fallback: newer docker CLI prints digest on stdout.
            DIGEST=$(docker inspect --format '{{index .RepoDigests 0}}' "$IMAGE" | awk -F@ '{print $2}')
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: SLSA-3 build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ inputs.registry }}/${{ inputs.service-name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
